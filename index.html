<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BTC Low Price Alarm</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            box-sizing: border-box;
            transition: background-color 0.2s; /* Smooth flashing */
        }

        /* Flashing Animation Class */
        .alarm-active {
            animation: flashRed 1s infinite;
        }

        @keyframes flashRed {
            0% { background-color: #000; }
            50% { background-color: #500; }
            100% { background-color: #000; }
        }

        h1 { font-size: 1rem; color: #888; margin-top: 10px; text-transform: uppercase; letter-spacing: 2px;}

        /* Price Display */
        #price-display {
            font-size: 4.5rem;
            font-weight: 800;
            margin: 20px 0;
            font-variant-numeric: tabular-nums;
        }

        .green { color: #0ecb81; }
        .red { color: #f6465d; }

        /* Start Button */
        #init-btn {
            background-color: #0ecb81; 
            color: #000;
            width: 100%; 
            padding: 25px;
            font-size: 1.2rem; 
            font-weight: 900;
            border: none; 
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(14, 203, 129, 0.3);
            text-transform: uppercase;
        }

        /* Controls */
        .controls {
            width: 100%;
            max-width: 400px;
            display: flex;
            gap: 10px;
        }

        input[type="number"] {
            flex: 1;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: white;
            font-size: 1.2rem;
            outline: none;
        }

        #add-btn {
            padding: 0 25px;
            border-radius: 8px;
            border: none;
            background-color: #F7931A;
            color: white;
            font-weight: bold;
            font-size: 1rem;
        }

        /* Alert List */
        #alert-list {
            list-style: none;
            padding: 0;
            width: 100%;
            max-width: 400px;
            margin-top: 30px;
        }

        .alert-item {
            background: #1a1a1a;
            margin-bottom: 10px;
            padding: 20px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2rem;
            border-left: 5px solid #444;
        }

        /* Style for alerts that are currently triggering */
        .alert-triggering {
            border-left: 5px solid #f6465d !important;
            background-color: #2a1111;
        }

        .delete-alert {
            background: #333;
            color: #fff;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            margin-left: 10px;
        }

        #status { margin-top: auto; color: #555; font-size: 0.8rem; }
    </style>
</head>
<body>

    <h1>Keep Below Target</h1>
    
    <div id="price-display">---</div>
    
    <button id="init-btn" onclick="startApp()">Tap to Start Monitor</button>

    <div class="controls">
        <input type="number" id="target-input" placeholder="Min Price (e.g. 60000)">
        <button id="add-btn" onclick="addAlert()">Set Limit</button>
    </div>

    <ul id="alert-list"></ul>
    
    <div id="status">Audio Inactive</div>

    <script>
        // --- STATE ---
        let audioCtx;
        let socket;
        let currentPrice = 0;
        let lastPrice = 0;
        let alerts = []; 
        let wakeLock = null;
        let alarmInterval = null; // Stores the repetitive loop

        const priceEl = document.getElementById('price-display');
        const listEl = document.getElementById('alert-list');
        const inputEl = document.getElementById('target-input');
        const statusEl = document.getElementById('status');
        const initBtn = document.getElementById('init-btn');

        // --- 1. INITIALIZATION ---
        async function startApp() {
            // Audio Context Setup
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }

            // Mobile Wake Lock
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    statusEl.innerText = "Screen Locked ON • Monitoring";
                }
            } catch (err) {
                console.log(err);
                statusEl.innerText = "Monitoring Active (Keep Screen Open)";
            }

            initBtn.style.display = 'none';
            
            // Start the WebSocket
            connectBinance();
            
            // Start the Alarm Check Loop (Runs every 1 second)
            startAlarmLoop();
        }

        // --- 2. THE CONTINUOUS LOOP ---
        function startAlarmLoop() {
            // This runs every 1000ms (1 second) regardless of WebSocket speed
            alarmInterval = setInterval(() => {
                if (currentPrice === 0) return;

                // Check if ANY alert is triggered
                // Condition: Current Price < Target
                const activeAlerts = alerts.filter(target => currentPrice < target);

                if (activeAlerts.length > 0) {
                    playAlarmPulse();
                    document.body.classList.add('alarm-active'); // Flash screen
                    highlightActiveAlerts(true);
                    statusEl.innerText = `BELOW LIMIT! (${activeAlerts.join(', ')})`;
                    statusEl.style.color = "red";
                } else {
                    document.body.classList.remove('alarm-active'); // Stop flash
                    highlightActiveAlerts(false);
                    if(wakeLock) statusEl.innerText = "Monitoring... (Safe)";
                    statusEl.style.color = "#555";
                }
            }, 1000);
        }

        // --- 3. AUDIO ENGINE (LOUD) ---
        function playAlarmPulse() {
            if (!audioCtx) return;

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            // Square wave = Harsh sound (Gameboy/Alarm style)
            osc.type = 'square'; 
            
            // Frequency Sweep (Siren effect)
            const now = audioCtx.currentTime;
            osc.frequency.setValueAtTime(800, now);
            osc.frequency.linearRampToValueAtTime(600, now + 0.1);
            osc.frequency.linearRampToValueAtTime(800, now + 0.2);

            // Volume
            gainNode.gain.setValueAtTime(0.3, now);
            gainNode.gain.linearRampToValueAtTime(0, now + 0.5);

            osc.start(now);
            osc.stop(now + 0.5);
        }

        // --- 4. DATA STREAM ---
        function connectBinance() {
            socket = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');

            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                currentPrice = parseFloat(data.p);
                
                // Update UI Price
                priceEl.innerText = currentPrice.toFixed(2);
                if (lastPrice > 0) {
                    priceEl.className = currentPrice > lastPrice ? 'green' : 'red';
                }
                lastPrice = currentPrice;
            };
            
            socket.onclose = () => {
                // Auto-reconnect if internet blips
                setTimeout(connectBinance, 5000);
            }
        }

        // --- 5. UI & LIST LOGIC ---
        function addAlert() {
            const val = parseFloat(inputEl.value);
            if (!val || alerts.includes(val)) return;

            alerts.push(val);
            alerts.sort((a, b) => b - a); // Sort high to low
            renderList();
            inputEl.value = '';
        }

        function removeAlert(val) {
            alerts = alerts.filter(a => a !== val);
            renderList();
        }

        function renderList() {
            listEl.innerHTML = '';
            alerts.forEach(val => {
                const li = document.createElement('li');
                li.className = 'alert-item';
                li.setAttribute('data-target', val); // Used for highlighting later
                li.innerHTML = `
                    <span>Below $${val.toLocaleString()}</span>
                    <button class="delete-alert" onclick="removeAlert(${val})">Delete</button>
                `;
                listEl.appendChild(li);
            });
        }

        function highlightActiveAlerts(isAlarming) {
            const items = document.querySelectorAll('.alert-item');
            items.forEach(item => {
                const target = parseFloat(item.getAttribute('data-target'));
                // If this specific item is the one causing the alarm
                if (currentPrice < target) {
                    item.classList.add('alert-triggering');
                } else {
                    item.classList.remove('alert-triggering');
                }
            });
        }
    </script>
</body>
</html>
