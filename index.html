<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BTC Wake Up Alert</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 { font-size: 1.2rem; color: #666; margin-top: 0; margin-bottom: 5px; }

        /* Big Price Display */
        #price-display {
            font-size: 4.5rem;
            font-weight: 800;
            margin: 10px 0;
            font-variant-numeric: tabular-nums;
            letter-spacing: -2px;
        }

        .green { color: #0ecb81; }
        .red { color: #f6465d; }

        /* Main Start Button */
        #init-btn {
            background-color: #0ecb81; 
            color: black; 
            width: 100%;
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(14, 203, 129, 0.4);
        }

        /* Test Alarm Button */
        #test-btn {
            background-color: #333;
            color: #fff;
            padding: 10px 20px;
            border: 1px solid #555;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        /* Inputs */
        .controls {
            width: 100%;
            max-width: 400px;
            display: flex;
            gap: 10px;
        }

        input[type="number"] {
            flex: 1;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: white;
            font-size: 1.2rem;
            outline: none;
        }

        #add-btn {
            padding: 15px 25px;
            border-radius: 8px;
            border: none;
            background-color: #F7931A;
            color: white;
            font-weight: bold;
            font-size: 1rem;
        }

        /* List */
        #alert-list {
            list-style: none;
            padding: 0;
            width: 100%;
            max-width: 400px;
            margin-top: 20px;
        }

        .alert-item {
            background: #1a1a1a;
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.3rem;
            border-left: 5px solid #444;
        }

        .delete-alert {
            color: #f6465d;
            background: none;
            border: none;
            font-size: 2rem;
            padding: 0 15px;
            line-height: 1;
        }

        #status {
            margin-top: auto;
            color: #444;
            font-size: 0.8rem;
            text-align: center;
            padding-bottom: 10px;
        }
    </style>
</head>
<body>

    <h1>BTC Alarm Clock</h1>
    
    <div id="price-display">---</div>
    
    <!-- This starts the Audio Context -->
    <button id="init-btn" onclick="startApp()">1. TAP HERE TO START</button>
    
    <button id="test-btn" onclick="triggerAlarm()">Test Alarm Volume (LOUD)</button>

    <div class="controls">
        <input type="number" id="target-input" placeholder="Price (e.g. 64000)">
        <button id="add-btn" onclick="addAlert()">Add Alert</button>
    </div>

    <ul id="alert-list"></ul>
    
    <div id="status">Audio Inactive</div>

    <script>
        // --- VARIABLES ---
        let audioCtx;
        let socket;
        let lastPrice = 0;
        let alerts = []; 
        let wakeLock = null;

        const priceEl = document.getElementById('price-display');
        const listEl = document.getElementById('alert-list');
        const inputEl = document.getElementById('target-input');
        const statusEl = document.getElementById('status');
        const initBtn = document.getElementById('init-btn');

        // --- 1. SETUP ---
        async function startApp() {
            // A. Create Audio Context
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            }
            // Resume if suspended (browser policy)
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }

            // B. Wake Lock (Keep phone screen ON)
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    statusEl.innerText = "Monitoring Active • Screen Locked On";
                } else {
                    statusEl.innerText = "Monitoring Active • Screen Lock Not Supported";
                }
            } catch (err) {
                console.log(err);
                statusEl.innerText = "Monitoring Active";
            }

            // C. UI Updates
            initBtn.style.display = 'none'; // Remove big button
            connectBinance();
        }

        // --- 2. THE LOUD ALARM ---
        function triggerAlarm() {
            if (!audioCtx) {
                alert("Please tap the green START button first.");
                return;
            }

            const now = audioCtx.currentTime;
            
            // Create Oscillator (The sound generator)
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            // "square" wave is much harsher/louder than "sine"
            osc.type = 'square'; 

            // ALARM PATTERN: Siren (Low-High-Low-High)
            // We schedule frequency changes over 3 seconds
            osc.frequency.setValueAtTime(600, now);
            osc.frequency.linearRampToValueAtTime(1200, now + 0.5);
            osc.frequency.linearRampToValueAtTime(600, now + 1.0);
            osc.frequency.linearRampToValueAtTime(1200, now + 1.5);
            osc.frequency.linearRampToValueAtTime(600, now + 2.0);
            osc.frequency.linearRampToValueAtTime(1200, now + 2.5);
            
            // VOLUME
            // 0.3 on a square wave is very loud. Be careful.
            gainNode.gain.setValueAtTime(0.2, now);
            gainNode.gain.linearRampToValueAtTime(0.2, now + 2.8);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 3.0); // Fade out

            // Play for 3 seconds
            osc.start(now);
            osc.stop(now + 3.0);
        }

        // --- 3. BINANCE DATA ---
        function connectBinance() {
            socket = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');

            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                const currentPrice = parseFloat(data.p);
                
                updateDisplay(currentPrice);
                checkAlerts(currentPrice);
                
                lastPrice = currentPrice;
            };
            
            socket.onerror = () => {
                statusEl.innerText = "Connection Lost. Refresh Page.";
            }
        }

        // --- 4. LOGIC ---
        function updateDisplay(price) {
            priceEl.innerText = price.toFixed(2);
            if (lastPrice > 0) {
                priceEl.className = price > lastPrice ? 'green' : 'red';
            }
        }

        function checkAlerts(currentPrice) {
            if (lastPrice === 0) return;

            alerts.forEach((target, index) => {
                // Check crossover
                const crossedUp = lastPrice < target && currentPrice >= target;
                const crossedDown = lastPrice > target && currentPrice <= target;

                if (crossedUp || crossedDown) {
                    triggerAlarm(); // PLAY THE BIG SOUND
                    flashScreen();
                    
                    // Optional: Remove alert after it triggers so it doesn't wake you up twice
                    // removeAlert(target); 
                }
            });
        }
        
        function flashScreen() {
            document.body.style.backgroundColor = '#fff';
            setTimeout(() => { document.body.style.backgroundColor = '#000'; }, 100);
            setTimeout(() => { document.body.style.backgroundColor = '#fff'; }, 200);
            setTimeout(() => { document.body.style.backgroundColor = '#000'; }, 300);
        }

        // --- 5. LIST MANAGEMENT ---
        function addAlert() {
            const val = parseFloat(inputEl.value);
            if (!val || alerts.includes(val)) return;

            alerts.push(val);
            alerts.sort((a, b) => b - a);
            renderList();
            inputEl.value = '';
        }

        function removeAlert(val) {
            alerts = alerts.filter(a => a !== val);
            renderList();
        }

        function renderList() {
            listEl.innerHTML = '';
            alerts.forEach(val => {
                const li = document.createElement('li');
                li.className = 'alert-item';
                li.innerHTML = `
                    <span>$${val.toLocaleString()}</span>
                    <button class="delete-alert" onclick="removeAlert(${val})">×</button>
                `;
                listEl.appendChild(li);
            });
        }
    </script>
</body>
</html>
