<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTC Range</title>
<style>
    body { background:#000; color:#fff; font-family:sans-serif; margin:0; height:100dvh; width:100vw; overflow:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .g { color:#0ecb81; } .r { color:#f6465d; } .y { color:#FFD700!important; }

    /* Shared circular button */
    .cbtn { background:#222; color:#888; border:1px solid #444; width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:11px; cursor:pointer; z-index:20; position:absolute; }

    /* ── Audio View ── */
    #audio-view { display:flex; flex-direction:column; align-items:center; justify-content:center; width:100%; height:100%; position:relative; }
    #price { font-size:27vw; font-weight:800; letter-spacing:-2px; cursor:pointer; user-select:none; text-align:center; width:100%; line-height:1; }
    #audio-bottom { position:absolute; bottom:30px; left:0; right:0; display:flex; align-items:center; justify-content:center; z-index:20; }
    #stat { font-size:12px; color:#0ecb81; font-weight:bold; }
    #btc-dom { font-size:50px; color:#FFD700; font-weight:bold; margin-top:8px; text-align:center; }
    #mkt-tog { left:30px; }
    #set-tog { right:30px; }

    #panel { display:none; position:fixed; inset:0; background:rgba(10,10,10,0.98); z-index:100; flex-direction:column; align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(5px); }
    #panel input { width:100%; padding:20px; background:#1a1a1a; border:1px solid #333; color:#0ecb81; border-radius:8px; font-size:24px; outline:none; text-align:center; margin-bottom:15px; }
    #act-btn { background:#F7931A; border:none; color:#fff; padding:20px; font-weight:800; font-size:18px; border-radius:8px; cursor:pointer; width:100%; }
    #close { position:absolute; top:20px; right:20px; font-size:30px; color:#666; cursor:pointer; }

    @keyframes s { 0%,100%{background:#f00} 50%{background:#000} }
    .al { animation:s 0.5s infinite; }
    @media (prefers-reduced-motion: reduce) { .al { animation:none; background:#f00; } }
    #stop { display:none; position:fixed; inset:0; background:rgba(255,0,0,0.3); z-index:101; border:none; color:#fff; font-size:15vw; font-weight:900; cursor:pointer; }

    /* ── Market View ── */
    #market-view { display:none; width:100%; height:100%; position:relative; font-family:'Courier New',monospace; }
    #back-btn { bottom:30px; left:50%; transform:translateX(-50%); }

    #market-view .w { padding:20px; cursor:pointer; user-select:none; position:fixed; }
    #market-view .l { font-size:24px; color:#666; font-weight:bold; letter-spacing:2px; text-transform:uppercase; }
    #market-view .p { font-size:96px; font-weight:bold; line-height:1; transition:color .5s; color:#fff; }
    #market-view .p.g { color:#0ecb81; } #market-view .p.r { color:#f6465d; } #market-view .p.y { color:#FFD700; }
    #market-view .sm { font-size:50px; margin-top:5px; }
    #market-view .sub { font-size:30px; margin-top:5px; font-weight:normal; opacity:0.9; }
    #market-view .row { display:flex; gap:40px; }
    #tl { top:10px; left:30px; } #tr { top:10px; right:30px; text-align:right; }
    #bl { bottom:10px; left:30px; } #br { bottom:10px; right:30px; text-align:right; }
    #tl .sub, #bl .sub { text-align:left; } #tr .sub, #br .sub { text-align:right; }

    @media (orientation:portrait) {
        #market-view { flex-direction:column; justify-content:space-evenly; align-items:center; }
        #market-view.active { display:flex; }
        #market-view .w { position:static; padding:0; width:100%; text-align:center!important; display:flex; flex-direction:column; align-items:center; }
        #market-view .l { font-size:5vw; } #market-view .p { font-size:16vw; }
        #market-view .sm { font-size:12vw; } #market-view .sub { font-size:5vw; text-align:center!important; }
        #market-view .row { justify-content:center; gap:10vw; }
    }
    @media (orientation:landscape) and (max-height:600px) {
        #market-view .w { padding:15px; }
        #market-view .l { font-size:4vh; } #market-view .p { font-size:18vh; }
        #market-view .sm { font-size:12vh; } #market-view .sub { font-size:6vh; }
        #market-view .row { gap:4vw; }
    }
</style>
</head>
<body>
    <div id="audio-view">
        <div id="price" role="status" aria-live="polite"></div>
        <div id="btc-dom"></div>
        <div id="audio-bottom">
            <button id="mkt-tog" class="cbtn" aria-label="Switch to market view" onclick="switchView('market')">M</button>
            <div id="stat"></div>
            <button id="set-tog" class="cbtn" aria-label="Open alarm settings" onclick="openSet()">SET</button>
        </div>
        <div id="panel">
            <button id="close" aria-label="Close settings" onclick="panel.style.display='none'">✕</button>
            <div style="width:100%;max-width:350px;text-align:center">
                <div style="color:#888;margin-bottom:20px">ALARM OUTSIDE RANGE</div>
                <input type="number" id="min" placeholder="Min" inputmode="decimal" enterkeyhint="next">
                <input type="number" id="max" placeholder="Max" inputmode="decimal" enterkeyhint="go">
                <button id="act-btn" onclick="setAlarm()">ACTIVATE</button>
                <div style="margin-top:20px;color:#f6465d;text-decoration:underline;cursor:pointer" onclick="clearAlarm()">Clear</div>
            </div>
        </div>
    </div>

    <div id="market-view">
        <div id="tl" class="w"><div id="l-tl" class="l">...</div><div id="p-tl" class="p">...</div></div>
        <div id="tr" class="w"><div id="l-tr" class="l">Gold</div><div id="p-tr" class="p y">...</div></div>
        <div id="bl" class="w">
            <div id="bx-tmb"><div class="l">TMB</div><div id="p-tmb" class="p">...</div></div>
            <div id="bx-yld" class="row" style="display:none">
                <div><div class="l">10Y</div><div id="p-10" class="p sm">...</div></div>
                <div><div class="l">30Y</div><div id="p-30" class="p sm">...</div></div>
            </div>
        </div>
        <div id="br" class="w"><div id="l-btc" class="l">Bitcoin</div><div id="p-btc" class="p">...</div></div>
        <button id="back-btn" class="cbtn" aria-label="Back to audio view" onclick="switchView('audio')">B</button>
    </div>

    <button id="stop" onclick="kill()">STOP</button>

<script>
    const el = id => document.getElementById(id);
    function tFetch(url, ms=8000) { const c=new AbortController(); const t=setTimeout(()=>c.abort(),ms); return fetch(url,{signal:c.signal}).finally(()=>clearTimeout(t)); }
    const pEl=el('price'), sEl=el('stat'), panel=el('panel'),
          mI=el('min'), xI=el('max'), stopB=el('stop'),
          audioView=el('audio-view'), marketView=el('market-view');

    /* ── Constants ── */
    const DEFAULT_RANGE_PCT = 0.01; /* 1% default alarm range */
    const BTC_DOM_CORRECTION = 1.04325; /* CoinGecko undercounts wrapped/ETF BTC */

    /* ── Shared State ── */
    let ctx, sock, lock, cur=0, btcRef=0, alarmMin=null, alarmMax=null,
        ring=false, mode='USD', lastRender=0, o1, o2, marketInited=false;

    /* ── Market View State (declared early to avoid reference issues) ── */
    const MKT_REFRESH=30000,
          HIST_WINDOW=20*60000, HIST_COMPARE=15*60000,
          IST_OPEN=510, IST_CLOSE=1080, YAHOO_MODE={PCT:1,ABS:2};
    const priceHistory = {};
    let overrideTL=null, overrideBL=null, toggleTR=false, toggleBR=false;
    let mktBtcDom='...', mktBtcRef=null;

    /* ── Shared Fetches ── */
    async function fetchBtcRef() {
        try {
            const d = await tFetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=16').then(r=>r.json());
            btcRef = mktBtcRef = parseFloat(d[0][4]);
        } catch(e) { console.warn('fetchBtcRef failed:', e); }
    }

    /* ── Audio View ── */
    async function init() {
        try { ctx = new (window.AudioContext||window.webkitAudioContext)(); ctx.resume().catch(()=>{}); } catch(e) {}
        try { if('wakeLock' in navigator) lock = await navigator.wakeLock.request('screen'); } catch(e) {}
        document.addEventListener('visibilitychange', async () => {
            if(document.visibilityState==='visible') {
                try { lock = await navigator.wakeLock.request('screen'); } catch(e) {}
            } else {
                lock = null;
            }
        });

        fetchBtcRef();
        fetchMktBtcDom();
        try { cur = parseFloat((await (await tFetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT')).json()).price); render(); } catch(e) { console.warn('Initial price fetch failed:', e); }

        connectSock();
        setInterval(fetchBtcRef, 60000);
        mI.onkeydown = e => { if(e.key=='Enter'){e.preventDefault();xI.focus()} };
        xI.onkeydown = e => { if(e.key=='Enter'){e.preventDefault();setAlarm()} };
        pEl.onclick = () => { mode = mode=='USD' ? 'SATS' : 'USD'; render(); };
    }

    function connectSock() {
        if(sock){try{sock.close();}catch(e){}}
        sock = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@miniTicker');
        sock.onmessage = e => {
            cur = parseFloat(JSON.parse(e.data).c);
            if (Date.now()-lastRender > 100) { render(); lastRender = Date.now(); }
            if (!ring && alarmMin !== null && alarmMax !== null && (cur<alarmMin || cur>alarmMax)) alarm();
            if (marketInited && !toggleBR) {
                const r = mktBtcRef ?? cur;
                setMktPrice('p-btc', Math.round(cur).toLocaleString(), `p ${cur>=r?'g':'r'}`);
            }
        };
        sock.onclose = () => setTimeout(connectSock, 3000);
        sock.onerror = () => { try{sock.close();}catch(e){} };
    }

    function render() {
        if (!cur) return;
        pEl.textContent = mode=='USD' ? Math.floor(cur).toLocaleString() : Math.floor(1e8/cur).toString();
        if (btcRef) pEl.className = cur > btcRef ? 'g' : 'r';
        el('btc-dom').textContent = mode=='SATS' && mktBtcDom!=='...' ? mktBtcDom : '';
    }

    function alarm() {
        ring=true; document.body.classList.add('al'); stopB.style.display='block'; panel.style.display='none';
        if (!ctx) return;
        ctx.resume().catch(()=>{});
        if(o1){try{o1.stop();}catch(e){}} if(o2){try{o2.stop();}catch(e){}}
        o1=ctx.createOscillator(); o2=ctx.createOscillator();
        let g=ctx.createGain(), lg=ctx.createGain();
        o1.type='sawtooth'; o1.frequency.value=800; o2.type='square'; o2.frequency.value=5; lg.gain.value=300;
        o2.connect(lg); lg.connect(o1.frequency); o1.connect(g); g.connect(ctx.destination);
        o1.start(); o2.start();
    }

    function kill() {
        if(o1){try{o1.stop();}catch(e){}} if(o2){try{o2.stop();}catch(e){}}
        o1=null; o2=null;
        ring=false; document.body.classList.remove('al'); stopB.style.display='none';
        clearAlarm();
    }

    function openSet() {
        panel.style.display='flex';
        if(!mI.value) mI.value=Math.floor(cur*(1-DEFAULT_RANGE_PCT));
        if(!xI.value) xI.value=200000;
        requestAnimationFrame(()=>mI.focus());
    }

    function setAlarm() {
        let n=parseFloat(mI.value), x=parseFloat(xI.value);
        if(isNaN(n)||isNaN(x)||n>=x) return alert("Invalid Range");
        alarmMin=n; alarmMax=x; sEl.textContent="ALARM ARMED"; sEl.style.cursor='pointer'; sEl.onclick=()=>clearAlarm(); panel.style.display='none';
        if(ctx) ctx.resume().catch(()=>{});
    }

    function clearAlarm() {
        alarmMin=null; alarmMax=null; sEl.textContent=""; sEl.style.cursor=''; sEl.onclick=null; mI.value=''; xI.value=''; panel.style.display='none';
    }

    /* ── View Switching ── */
    function switchView(view) {
        if (view === 'market') {
            audioView.style.display='none';
            marketView.style.display='flex'; marketView.classList.add('active');
            if (!marketInited) { marketInited=true; initMarket(); }
        } else {
            marketView.style.display='none'; marketView.classList.remove('active');
            audioView.style.display='flex';
        }
    }

    /* ── Market View ── */
    function setMktPrice(id, text, cls) {
        const e=el(id); e.textContent=text; if(cls) e.className=cls;
    }

    function setMktPriceSub(id, price, sub, up) {
        const e=el(id); e.textContent='';
        e.appendChild(document.createTextNode(price));
        const s=document.createElement('div'); s.className='sub'; s.textContent=sub;
        e.appendChild(s); e.className=`p ${up?'g':'r'}`;
    }

    function isIST() {
        const ist=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Kolkata'}));
        const day=ist.getDay();
        if(day===0||day===6) return false;
        const m=ist.getHours()*60+ist.getMinutes();
        return m>=IST_OPEN&&m<=IST_CLOSE;
    }

    function fmt(v,d) { return v.toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d}); }

    async function fetchTreasury(sym, id) {
        try {
            const d=await(await tFetch(`https://quote.cnbc.com/quote-html-webservice/restQuote/symbolType/symbol?symbols=${sym}&requestMethod=itv&no498498=1&partnerId=2&fund=1&exthrs=1&output=json`)).json();
            const q=d.FormattedQuoteResult.FormattedQuote[0], y=parseFloat(q.last), pc=parseFloat(q.previous_day_closing);
            setMktPrice(id,y.toFixed(2),`p sm ${y>=pc?'g':'r'}`);
        } catch(e) { console.warn(`CNBC fail ${sym}:`,e); }
    }

    const CNBC_SYMS={'^NSEI':'.NSEI','^IXIC':'.IXIC','GC=F':'@GC.1','INR=X':'INR=','TMB.NS':'TMB-IN'};
    async function fetchQuote(sym, id, {decimals=0,fixedColor=false,mode:m=0}={}) {
        try {
            const csym=CNBC_SYMS[sym]||sym;
            const d=await(await tFetch(`https://quote.cnbc.com/quote-html-webservice/restQuote/symbolType/symbol?symbols=${csym}&requestMethod=itv&no498498=1&partnerId=2&fund=1&exthrs=1&output=json`)).json();
            const q=d.FormattedQuoteResult.FormattedQuote[0], p=parseFloat(q.last.replace(/,/g,'')), pc=parseFloat(q.previous_day_closing.replace(/,/g,''));
            const txt=fmt(p,decimals?2:0);
            if(fixedColor) return setMktPrice(id,txt);
            if(m) {
                const diff=p-pc, sign=diff>=0?'+':'';
                const sub=m===YAHOO_MODE.PCT ? `${sign}${diff.toFixed(2)} (${sign}${(diff/pc*100).toFixed(2)}%)` : `(${sign}${diff.toFixed(2)})`;
                setMktPriceSub(id,txt,sub,diff>=0); return;
            }
            const now=Date.now();
            priceHistory[sym]=(priceHistory[sym]||[]).filter(x=>now-x.t<HIST_WINDOW);
            priceHistory[sym].push({t:now,p});
            const older=priceHistory[sym].find(x=>now-x.t>=HIST_COMPARE);
            setMktPrice(id,txt,`p ${p>=(older?older.p:pc)?'g':'r'}`);
        } catch(e) { console.warn(`CNBC fail ${sym}:`,e); }
    }

    async function fetchMktBtcDom() {
        try {
            const d=await(await tFetch('https://api.coingecko.com/api/v3/global')).json();
            mktBtcDom=(parseFloat(d.data.market_cap_percentage.btc)*BTC_DOM_CORRECTION).toFixed(2)+'%';
            if(toggleBR) setMktPrice('p-btc',mktBtcDom);
            render();
        } catch(e) { console.warn('BTC dominance fetch failed:', e); }
    }

    function showBtcView() {
        if(toggleBR){ setMktPrice('l-btc','BTC Dom'); setMktPrice('p-btc',mktBtcDom,'p y'); }
        else { setMktPrice('l-btc','Bitcoin'); }
    }

    function scheduleMarket() {
        runMarket().then(()=>setTimeout(scheduleMarket,MKT_REFRESH));
    }
    function scheduleBtcDom() {
        fetchMktBtcDom().then(()=>setTimeout(scheduleBtcDom,MKT_REFRESH));
    }

    async function runMarket() {
        const ist=isIST(), indTL=overrideTL!==null?overrideTL:ist, indBL=overrideBL!==null?overrideBL:ist;
        setMktPrice('l-tl',indTL?'Nifty':'Nasdaq');
        fetchQuote(indTL?'^NSEI':'^IXIC','p-tl',{mode:YAHOO_MODE.PCT});
        setMktPrice('l-tr',toggleTR?'USD/INR':'Gold');
        fetchQuote(toggleTR?'INR=X':'GC=F','p-tr',{decimals:toggleTR?1:0,fixedColor:true});
        el('bx-tmb').style.display=indBL?'block':'none';
        el('bx-yld').style.display=indBL?'none':'flex';
        if(indBL) fetchQuote('TMB.NS','p-tmb',{decimals:1,mode:YAHOO_MODE.ABS});
        else { fetchTreasury('US10Y','p-10'); fetchTreasury('US30Y','p-30'); }
    }

    function initMarket() {
        el('tl').onclick=()=>{ overrideTL=!(overrideTL!==null?overrideTL:isIST()); el('p-tl').textContent='...'; runMarket(); };
        el('tr').onclick=()=>{ toggleTR=!toggleTR; el('p-tr').textContent='...'; runMarket(); };
        el('bl').onclick=()=>{ overrideBL=!(overrideBL!==null?overrideBL:isIST()); el('p-tmb').textContent='...'; el('p-10').textContent='...'; el('p-30').textContent='...'; runMarket(); };
        el('br').onclick=()=>{ toggleBR=!toggleBR; el('p-btc').textContent='...'; showBtcView(); };
        scheduleMarket(); setTimeout(runMarket,10000);
        showBtcView();
        scheduleBtcDom();
    }

    init();
</script>
</body>
</html>
