<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BTC Continuous Alarm</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden; /* Prevent scrolling */
        }

        /* The Flashing Red Background Animation */
        @keyframes emergencyFlash {
            0% { background-color: #ff0000; }
            50% { background-color: #000000; }
            100% { background-color: #ff0000; }
        }

        .alarm-triggered {
            animation: emergencyFlash 0.5s infinite; /* Fast strobe */
        }

        /* Typography */
        h1 { font-size: 1rem; color: #666; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        
        #price-display {
            font-size: 18vw; /* Massive responsive text */
            font-weight: 800;
            margin: 10px 0;
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }

        .green { color: #0ecb81; }
        .red { color: #f6465d; }

        /* Setup Button */
        #init-btn {
            background-color: #0ecb81;
            color: #000;
            width: 100%;
            padding: 20px;
            font-size: 1.2rem;
            font-weight: 900;
            border: none;
            border-radius: 12px;
            margin-bottom: 20px;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(14, 203, 129, 0.4);
        }

        /* Controls Area */
        .controls {
            width: 100%;
            max-width: 400px;
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #222;
            color: white;
            font-size: 1.2rem;
        }

        #add-btn {
            padding: 15px;
            background: #F7931A;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
        }

        /* Active Alerts List */
        #alert-list {
            list-style: none;
            padding: 0;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .alert-item {
            background: #222;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            font-size: 1.2rem;
            display: flex;
            justify-content: space-between;
        }

        /* THE KILL SWITCH (Hidden by default) */
        #stop-alarm-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.9);
            z-index: 999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #stop-btn {
            width: 80%;
            height: 50%;
            background: white;
            color: red;
            font-weight: 900;
            font-size: 3rem;
            border: 5px solid black;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #status {
            position: fixed;
            bottom: 20px;
            color: #555;
            font-size: 0.8rem;
        }

    </style>
</head>
<body>

    <h1>Current Price</h1>
    <div id="price-display">---</div>

    <!-- Start Button -->
    <button id="init-btn" onclick="startApp()">Tap to Enable Sound</button>

    <div class="controls">
        <input type="number" id="target-input" placeholder="Alert below (e.g. 62000)">
        <button id="add-btn" onclick="addAlert()">Set</button>
    </div>

    <ul id="alert-list"></ul>

    <div id="status">Audio Inactive</div>

    <!-- The Emergency Stop Overlay -->
    <div id="stop-alarm-overlay">
        <h1 style="color:white; font-size: 2rem; margin-bottom: 20px;">PRICE DROP DETECTED</h1>
        <button id="stop-btn" onclick="killAlarm()">STOP ALARM</button>
    </div>

    <script>
        // --- GLOBAL STATE ---
        let audioCtx;
        let socket;
        let currentPrice = 0;
        let lastPrice = 0;
        let activeAlerts = []; 
        let wakeLock = null;
        
        // Alarm State
        let isRinging = false;
        let masterOscillator = null;
        let lfoOscillator = null;

        const priceEl = document.getElementById('price-display');
        const listEl = document.getElementById('alert-list');
        const inputEl = document.getElementById('target-input');
        const statusEl = document.getElementById('status');
        const initBtn = document.getElementById('init-btn');
        const stopOverlay = document.getElementById('stop-alarm-overlay');

        // --- 1. INITIALIZATION ---
        async function startApp() {
            // Setup Audio Context
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }

            // Request Wake Lock (Keep phone screen on)
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    statusEl.innerText = "Screen Lock Active • Monitoring";
                }
            } catch (err) {
                console.log(err);
                statusEl.innerText = "Monitoring Active";
            }

            initBtn.style.display = 'none';
            connectBinance();
        }

        // --- 2. THE CONTINUOUS ALARM ENGINE ---
        function startContinuousAlarm() {
            if (isRinging) return; // Don't start if already ringing
            isRinging = true;

            // Visual Panic
            document.body.classList.add('alarm-triggered');
            stopOverlay.style.display = 'flex'; // Show the giant stop button

            // Audio Panic (The Siren)
            if (!audioCtx) return;

            // 1. Create the main tone (Sawtooth is harsh/buzzy)
            masterOscillator = audioCtx.createOscillator();
            masterOscillator.type = 'sawtooth';
            masterOscillator.frequency.value = 600; // Base frequency

            // 2. Create an LFO (Low Frequency Oscillator) to modulate pitch
            // This makes the "Wee-Woo-Wee-Woo" siren sound
            lfoOscillator = audioCtx.createOscillator();
            lfoOscillator.type = 'sine';
            lfoOscillator.frequency.value = 4; // Speed of siren (4 times per second)

            // 3. Gain node to control how much the LFO affects the pitch
            const lfoGain = audioCtx.createGain();
            lfoGain.gain.value = 200; // Pitch swings up/down by 200Hz

            // 4. Master Volume
            const masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.5; // 50% Volume

            // 5. Connect everything: LFO -> LFO Gain -> Master Pitch
            lfoOscillator.connect(lfoGain);
            lfoGain.connect(masterOscillator.frequency);
            
            masterOscillator.connect(masterGain);
            masterGain.connect(audioCtx.destination);

            // 6. Start the noise
            masterOscillator.start();
            lfoOscillator.start();
        }

        function killAlarm() {
            // Stop Sound
            if (masterOscillator) {
                masterOscillator.stop();
                masterOscillator.disconnect();
            }
            if (lfoOscillator) {
                lfoOscillator.stop();
                lfoOscillator.disconnect();
            }

            isRinging = false;

            // Stop Visuals
            document.body.classList.remove('alarm-triggered');
            stopOverlay.style.display = 'none';

            // CRITICAL: Remove the alerts that triggered the alarm
            // If we don't do this, it will start ringing again instantly
            activeAlerts = activeAlerts.filter(target => currentPrice >= target);
            renderList();

            alert("Alarm Stopped. Triggers removed. Set new target if needed.");
        }

        // --- 3. DATA & LOGIC ---
        function connectBinance() {
            socket = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');

            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                currentPrice = parseFloat(data.p);
                
                // Display Update
                priceEl.innerText = Math.floor(currentPrice); // Remove decimals for cleaner big look
                if (lastPrice > 0) {
                    priceEl.className = currentPrice > lastPrice ? 'green' : 'red';
                }

                // Check Triggers
                checkTriggers();
                
                lastPrice = currentPrice;
            };

            socket.onclose = () => { setTimeout(connectBinance, 3000); };
        }

        function checkTriggers() {
            if (isRinging) return; // If already screaming, ignore logic

            // Check if price dropped below ANY active target
            const triggered = activeAlerts.some(target => currentPrice < target);

            if (triggered) {
                startContinuousAlarm();
            }
        }

        // --- 4. LIST MANAGEMENT ---
        function addAlert() {
            const val = parseFloat(inputEl.value);
            if (!val) return;

            // Prevent adding a target that is already triggered immediately
            if (currentPrice > 0 && val > currentPrice) {
                alert("Cannot set alert higher than current price! This tool is for Price DROPS.");
                return;
            }

            if (!activeAlerts.includes(val)) {
                activeAlerts.push(val);
                activeAlerts.sort((a, b) => b - a);
                renderList();
            }
            inputEl.value = '';
        }

        function removeAlert(val) {
            activeAlerts = activeAlerts.filter(a => a !== val);
            renderList();
        }

        function renderList() {
            listEl.innerHTML = '';
            activeAlerts.forEach(val => {
                const li = document.createElement('li');
                li.className = 'alert-item';
                li.innerHTML = `
                    <span>Below $${val.toLocaleString()}</span>
                    <button onclick="removeAlert(${val})" style="background:none; border:none; color:red; font-weight:bold;">X</button>
                `;
                listEl.appendChild(li);
            });
        }
    </script>
</body>
</html>
