<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BTC Master Alarm</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- THE MASSIVE NUMBER --- */
        #price-display {
            font-size: 22vw; /* Slightly smaller to fit commas */
            font-weight: 800;
            font-variant-numeric: tabular-nums; 
            letter-spacing: -2px;
            z-index: 10;
            transition: color 0.5s;
            cursor: pointer; /* Indicates clickable */
            user-select: none;
            text-align: center;
            width: 100%;
        }

        .green { color: #0ecb81; }
        .red { color: #f6465d; }

        /* Label to show mode (USD or SATS) */
        #mode-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, 80px); /* Position below number */
            font-size: 1rem;
            color: #444;
            font-weight: bold;
            letter-spacing: 2px;
            pointer-events: none;
        }

        /* --- SETTINGS BUTTON (Corner) --- */
        #settings-toggle {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: #222;
            color: #888;
            border: 1px solid #444;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
        }

        /* --- SETTINGS PANEL --- */
        #settings-panel {
            display: none;
            position: absolute;
            bottom: 100px;
            right: 30px;
            width: 280px;
            background: #111;
            border: 1px solid #333;
            padding: 15px;
            border-radius: 12px;
            z-index: 30;
        }

        .input-group { display: flex; gap: 5px; margin-bottom: 15px; }
        
        input {
            width: 100%;
            padding: 15px;
            background: #000;
            border: 1px solid #333;
            color: white;
            border-radius: 4px;
            font-size: 18px;
        }

        #add-btn {
            background: #F7931A;
            border: none;
            color: white;
            padding: 0 20px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }

        ul { list-style: none; padding: 0; margin: 0; max-height: 200px; overflow-y: auto; }
        
        li {
            display: flex; 
            justify-content: space-between; 
            padding: 10px 0; 
            border-bottom: 1px solid #222;
            font-size: 16px;
            color: #ccc;
        }

        /* --- OVERLAYS --- */
        #start-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            flex-direction: column;
        }
        #start-text {
            color: #0ecb81;
            border: 2px solid #0ecb81;
            padding: 20px 40px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% {opacity: 0.5;} 50% {opacity: 1;} 100% {opacity: 0.5;} }

        /* Alarm States */
        @keyframes strobe {
            0% { background-color: #ff0000; }
            50% { background-color: #000000; }
            100% { background-color: #ff0000; }
        }

        .alarm-active { animation: strobe 0.2s infinite; }

        #stop-btn {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(255, 0, 0, 0.3);
            z-index: 100;
            border: none;
            color: white;
            font-size: 15vw;
            font-weight: 900;
            text-shadow: 2px 2px 10px #000;
        }

        #status {
            position: absolute;
            top: 20px;
            font-size: 12px;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="status">Wait...</div>

    <!-- The Big Number (Clickable) -->
    <div id="price-display" onclick="toggleMode()">---</div>
    <div id="mode-label">USD</div>

    <!-- Corner Button -->
    <div id="settings-toggle" onclick="toggleSettings()">SET</div>

    <!-- Settings Menu -->
    <div id="settings-panel">
        <div style="font-size: 12px; color: #888; margin-bottom: 10px;">ALARM BELOW PRICE (USD):</div>
        <div class="input-group">
            <input type="number" id="target-input" placeholder="e.g. 64000">
            <button id="add-btn" onclick="addAlert()">+</button>
        </div>
        <ul id="alert-list"></ul>
    </div>

    <!-- Start Overlay -->
    <div id="start-overlay" onclick="initApp()">
        <div id="start-text">TAP TO START</div>
    </div>

    <!-- Kill Switch -->
    <button id="stop-btn" onclick="killAlarm()">STOP</button>

    <script>
        // --- CONFIG ---
        let audioCtx;
        let socket;
        let wakeLock = null;
        
        // --- STATE ---
        let currentPrice = 0;
        let referencePrice = 0; // Price 30 mins ago
        let alerts = [];
        let isRinging = false;
        let displayMode = 'USD'; // 'USD' or 'SATS'
        
        // Audio
        let oscMain, oscLFO;

        // DOM Elements
        const priceEl = document.getElementById('price-display');
        const modeLabel = document.getElementById('mode-label');
        const statusEl = document.getElementById('status');
        const panelEl = document.getElementById('settings-panel');
        const listEl = document.getElementById('alert-list');
        const inputEl = document.getElementById('target-input');
        const startOverlay = document.getElementById('start-overlay');
        const stopBtn = document.getElementById('stop-btn');

        // --- 1. INITIALIZATION ---
        async function initApp() {
            // Audio Context
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            // Wake Lock
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    statusEl.innerText = "SCREEN LOCK ACTIVE";
                }
            } catch (err) { statusEl.innerText = "MONITORING ACTIVE"; }

            // UI Cleanup
            startOverlay.style.display = 'none';
            
            // Get initial 30m ago price
            await fetchReferencePrice();
            
            // Start WebSocket
            connectBinance();

            // Update Reference price every 60 seconds
            setInterval(fetchReferencePrice, 60000);
        }

        // --- 2. DATA HANDLING ---
        
        // A. Real-time Price
        function connectBinance() {
            socket = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');
            
            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                currentPrice = parseFloat(data.p);
                renderDisplay();
                checkAlerts();
            };

            socket.onerror = () => { statusEl.innerText = "DISCONNECTED - REFRESH"; }
        }

        // B. Historical Price (30 Mins Ago)
        async function fetchReferencePrice() {
            try {
                // Fetch 1-minute candles, limit 31. The first one is ~30 mins ago.
                const res = await fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=31');
                const data = await res.json();
                // data[0][4] is the "Close" price of the candle 30 minutes ago
                referencePrice = parseFloat(data[0][4]);
                
                // Update text to show user what we are comparing to
                console.log(`Reference Price (30m ago): ${referencePrice}`);
            } catch (e) {
                console.error("Could not fetch history");
            }
        }

        // --- 3. RENDERING ---
        function toggleMode() {
            displayMode = displayMode === 'USD' ? 'SATS' : 'USD';
            renderDisplay();
        }

        function renderDisplay() {
            if (currentPrice === 0) return;

            // 1. Calculate Number
            let displayValue = "";
            
            if (displayMode === 'USD') {
                // Regular Price with comma
                displayValue = Math.floor(currentPrice).toLocaleString();
                modeLabel.innerText = "USD";
            } else {
                // Sats per Dollar: 100,000,000 / Price
                const sats = Math.floor(100000000 / currentPrice);
                displayValue = sats.toLocaleString();
                modeLabel.innerText = "SATS / USD";
            }
            
            priceEl.innerText = displayValue;

            // 2. Calculate Color (Based on 30m Trend)
            if (referencePrice > 0) {
                if (currentPrice > referencePrice) {
                    priceEl.className = 'green';
                } else {
                    priceEl.className = 'red';
                }
            }
        }

        // --- 4. ALARM LOGIC ---
        function checkAlerts() {
            if (isRinging) return;

            // Trigger if ANY alert is higher than current price
            const triggered = alerts.some(target => currentPrice < target);

            if (triggered) {
                triggerAlarm();
            }
        }

        function triggerAlarm() {
            isRinging = true;
            document.body.classList.add('alarm-active');
            stopBtn.style.display = 'block'; 
            panelEl.style.display = 'none'; 

            if (!audioCtx) return;

            // Siren Sound
            oscMain = audioCtx.createOscillator();
            oscLFO = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const lfoGain = audioCtx.createGain();

            oscMain.type = 'sawtooth';
            oscMain.frequency.value = 800;

            oscLFO.type = 'square';
            oscLFO.frequency.value = 5;

            lfoGain.gain.value = 300;

            oscLFO.connect(lfoGain);
            lfoGain.connect(oscMain.frequency);
            
            oscMain.connect(gain);
            gain.connect(audioCtx.destination);
            
            oscMain.start();
            oscLFO.start();
        }

        function killAlarm() {
            if(oscMain) oscMain.stop();
            if(oscLFO) oscLFO.stop();
            isRinging = false;
            document.body.classList.remove('alarm-active');
            stopBtn.style.display = 'none';
            
            // Remove triggered alerts
            alerts = alerts.filter(target => currentPrice >= target);
            renderList();
        }

        // --- 5. UI UTILS ---
        function toggleSettings() {
            if (panelEl.style.display === 'block') {
                panelEl.style.display = 'none';
            } else {
                panelEl.style.display = 'block';
                inputEl.focus();
            }
        }

        function addAlert() {
            const val = parseFloat(inputEl.value);
            if (!val) return;
            
            if (val > currentPrice) {
                alert("Target must be LOWER than current price.");
                return;
            }

            alerts.push(val);
            alerts.sort((a,b) => b-a);
            renderList();
            inputEl.value = '';
        }

        function removeAlert(val) {
            alerts = alerts.filter(a => a !== val);
            renderList();
        }

        function renderList() {
            listEl.innerHTML = '';
            alerts.forEach(val => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span>< ${val.toLocaleString()}</span>
                    <span onclick="removeAlert(${val})" style="color:#f6465d;cursor:pointer;">✖</span>
                `;
                listEl.appendChild(li);
            });
        }
    </script>
</body>
</html>
