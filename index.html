<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BTC Range</title>
<style>
    body { background:#000; color:#fff; font-family:sans-serif; margin:0; height:100dvh; width:100vw; overflow:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    
    #price { font-size:22vw; font-weight:800; letter-spacing:-2px; z-index:10; cursor:pointer; user-select:none; text-align:center; width:100%; line-height: 1; }
    
    /* Adjusted font size slightly to accommodate extra digit if needed */
    #dom { font-size: 6vw; color: #888; font-weight: 600; margin-top: 10px; height: 8vw; display:flex; align-items:center; justify-content:center; }
    
    .g { color:#0ecb81; } .r { color:#f6465d; }
    #set-tog { position:absolute; bottom:30px; right:30px; background:#222; color:#888; border:1px solid #444; width:60px; height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; cursor:pointer; z-index:20; }
    #panel { display:none; position:fixed; inset:0; background:rgba(10,10,10,0.98); z-index:100; flex-direction:column; align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(5px); }
    input { width:100%; padding:20px; background:#1a1a1a; border:1px solid #333; color:#0ecb81; border-radius:8px; font-size:24px; outline:none; text-align:center; margin-bottom:15px; }
    #act-btn { background:#F7931A; border:none; color:#fff; padding:20px; font-weight:800; font-size:18px; border-radius:8px; cursor:pointer; width:100%; }
    #close { position:absolute; top:20px; right:20px; font-size:30px; color:#666; cursor:pointer; }
    #overlay { position:absolute; inset:0; background:rgba(0,0,0,0.9); display:flex; align-items:center; justify-content:center; z-index:50; }
    #start { color:#0ecb81; border:2px solid #0ecb81; padding:20px 40px; border-radius:50px; font-weight:bold; animation:p 2s infinite; cursor:pointer; }
    @keyframes p { 0%,100%{opacity:0.5} 50%{opacity:1} }
    @keyframes s { 0%,100%{background:#f00} 50%{background:#000} }
    .al { animation:s 0.2s infinite; }
    #stop { display:none; position:fixed; inset:0; background:rgba(255,0,0,0.3); z-index:101; border:none; color:#fff; font-size:15vw; font-weight:900; cursor:pointer; }
    #stat { position:absolute; top:20px; left:20px; font-size:12px; color:#0ecb81; font-weight:bold; z-index:15; }
</style>
</head>
<body>
    <div id="stat"></div>
    <div id="price" onclick="mode=mode=='USD'?'SATS':'USD';render()">---</div>
    <div id="dom"></div>
    
    <div id="set-tog" onclick="openSet()">SET</div>
    
    <div id="panel">
        <div id="close" onclick="panel.style.display='none'">✕</div>
        <div style="width:100%;max-width:350px;text-align:center">
            <div style="color:#888;margin-bottom:20px">ALARM OUTSIDE RANGE</div>
            <input type="number" id="min" placeholder="Min" inputmode="decimal" enterkeyhint="next">
            <input type="number" id="max" placeholder="Max" inputmode="decimal" enterkeyhint="go">
            <button id="act-btn" onclick="set()">ACTIVATE</button>
            <div style="margin-top:20px;color:#f6465d;text-decoration:underline;cursor:pointer" onclick="clearR()">Clear</div>
        </div>
    </div>

    <div id="overlay" onclick="init()"><div id="start">TAP TO START</div></div>
    <button id="stop" onclick="kill()">STOP</button>

<script>
    let ctx, sock, lock, cur=0, ref=0, dom=0, min=null, max=null, ring=false, mode='USD', last=0, o1, o2;
    const pEl=document.getElementById('price'), sEl=document.getElementById('stat'), dEl=document.getElementById('dom'),
          panel=document.getElementById('panel'), mI=document.getElementById('min'), xI=document.getElementById('max'), stopB=document.getElementById('stop');

    async function init() {
        const AC=window.AudioContext||window.webkitAudioContext; ctx=new AC();
        if(ctx.state==='suspended') await ctx.resume();
        try { if('wakeLock' in navigator) lock=await navigator.wakeLock.request('screen'); } catch(e){}
        document.getElementById('overlay').style.display='none';
        
        getRef(); 
        getDom(); 
        
        sock=new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');
        sock.onmessage=e=>{
            cur=parseFloat(JSON.parse(e.data).p);
            if(Date.now()-last>100){ render(); last=Date.now(); }
            if(!ring && min && max && (cur<min || cur>max)) alarm();
        };
        setInterval(getRef,60000); 
        setInterval(getDom,300000); 
        
        mI.onkeydown=e=>{if(e.key=='Enter'){e.preventDefault();xI.focus()}};
        xI.onkeydown=e=>{if(e.key=='Enter'){e.preventDefault();set()}};
    }

    // Fetches 16 minutes of history, index [0] is 15 mins ago
    async function getRef(){ 
        try{
            let r = await fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=16');
            let data = await r.json();
            ref = parseFloat(data[0][4]); // Close price of the oldest candle fetched
        }catch(e){} 
    }

    async function getDom(){ 
        try{
            let r = await fetch('https://api.coingecko.com/api/v3/global');
            let data = await r.json();
            dom = parseFloat(data.data.market_cap_percentage.btc)*1.04325;
            render(); 
        }catch(e){ console.log("CG Fetch Err", e); } 
    }

    function render(){
        if(!cur)return;
        
        pEl.innerText = mode=='USD' ? Math.floor(cur).toLocaleString() : Math.floor(1e8/cur).toString();
        // Color based on 15-min old price
        if(ref) pEl.className = cur>ref ? 'g' : 'r';

        // Updated to toFixed(2)
        if(mode === 'SATS' && dom > 0) {
            dEl.innerText = "BTC.D " + dom.toFixed(2) + "%";
        } else {
            dEl.innerText = "";
        }
    }

    function alarm(){
        ring=true; document.body.classList.add('al'); stopB.style.display='block'; panel.style.display='none';
        if(!ctx)return;
        o1=ctx.createOscillator(); o2=ctx.createOscillator();
        let g=ctx.createGain(), lg=ctx.createGain();
        o1.type='sawtooth'; o1.frequency.value=800; o2.type='square'; o2.frequency.value=5; lg.gain.value=300;
        o2.connect(lg); lg.connect(o1.frequency); o1.connect(g); g.connect(ctx.destination);
        o1.start(); o2.start();
    }

    function kill(){
        if(o1)o1.stop(); if(o2)o2.stop();
        ring=false; document.body.classList.remove('al'); stopB.style.display='none';
        clearR(); alert("Stopped & Cleared");
    }

    function openSet(){
        panel.style.display='flex';
        if(!mI.value) mI.value=Math.floor(cur*0.99);
        if(!xI.value) xI.value=Math.floor(cur*1.01);
        setTimeout(()=>mI.focus(),100);
    }

    function set(){
        let n=parseFloat(mI.value), x=parseFloat(xI.value);
        if(!n||!x||n>=x) return alert("Invalid Range");
        min=n; max=x; sEl.innerText="ALARM ARMED"; panel.style.display='none';
    }

    function clearR(){
        min=null; max=null; sEl.innerText=""; mI.value=''; xI.value=''; panel.style.display='none';
    }
</script>
</body>
</html>
