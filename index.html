<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BTC Range Alarm</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh; /* Fallback */
            height: 100dvh; /* Dynamic viewport height for mobile */
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- THE MASSIVE NUMBER --- */
        #price-display {
            font-size: 22vw; 
            font-weight: 800;
            font-variant-numeric: tabular-nums; 
            letter-spacing: -2px;
            z-index: 10;
            transition: color 0.3s;
            cursor: pointer;
            user-select: none;
            text-align: center;
            width: 100%;
            line-height: 1;
        }

        .green { color: #0ecb81; }
        .red { color: #f6465d; }

        /* --- SETTINGS TOGGLE BUTTON --- */
        #settings-toggle {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: #222;
            color: #888;
            border: 1px solid #444;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
            user-select: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* --- FULL SCREEN SETTINGS OVERLAY --- */
        #settings-panel {
            display: none; /* Hidden by default */
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10, 10, 10, 0.98); /* Almost solid black */
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(5px);
        }

        .settings-content {
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        .label {
            color: #888;
            font-size: 14px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group {
            display: flex;
            flex-direction: column; /* Stack vertically on mobile */
            gap: 15px;
            margin-bottom: 25px;
        }
        
        input {
            width: 100%;
            padding: 20px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #0ecb81; /* Green text */
            border-radius: 8px;
            font-size: 24px;
            outline: none;
            text-align: center;
            box-sizing: border-box; /* Fix padding issues */
            -moz-appearance: textfield; /* Remove spinner */
        }

        /* Set Button */
        #set-btn {
            background: #F7931A;
            border: none;
            color: white;
            padding: 20px;
            font-weight: 800;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(247, 147, 26, 0.3);
        }

        /* Close Button (X) */
        #close-settings {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 30px;
            color: #666;
            cursor: pointer;
            padding: 10px;
        }

        /* Current Range Status (Bottom of screen usually) */
        #range-status-bar {
            position: absolute;
            bottom: 30px;
            left: 30px;
            font-size: 14px;
            color: #666;
            z-index: 15;
            pointer-events: none;
            display: none;
        }
        #range-status-bar span { color: #0ecb81; font-weight: bold; }

        /* --- OVERLAYS --- */
        #start-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            flex-direction: column;
        }
        #start-text {
            color: #0ecb81;
            border: 2px solid #0ecb81;
            padding: 20px 40px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            animation: pulse 2s infinite;
            cursor: pointer;
        }

        @keyframes pulse { 0% {opacity: 0.5;} 50% {opacity: 1;} 100% {opacity: 0.5;} }

        /* Alarm States */
        @keyframes strobe {
            0% { background-color: #ff0000; }
            50% { background-color: #000000; }
            100% { background-color: #ff0000; }
        }

        .alarm-active { animation: strobe 0.2s infinite; }

        #stop-btn {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(255, 0, 0, 0.3);
            z-index: 100;
            border: none;
            color: white;
            font-size: 15vw;
            font-weight: 900;
            text-shadow: 2px 2px 10px #000;
            cursor: pointer;
        }

        #status {
            position: absolute;
            top: 20px;
            font-size: 12px;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 1px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="status">Wait...</div>

    <!-- The Big Number (Clickable) -->
    <div id="price-display" onclick="toggleMode()">---</div>

    <!-- Active Range Display (Bottom Left) -->
    <div id="range-status-bar">
        RANGE: <span id="active-range-text">---</span>
    </div>

    <!-- Corner Button -->
    <div id="settings-toggle" onclick="openSettings()">SET</div>

    <!-- FULL SCREEN Settings Panel -->
    <div id="settings-panel">
        <div id="close-settings" onclick="closeSettings()">✕</div>
        
        <div class="settings-content">
            <div class="label">Alarm Outside Range</div>
            
            <div class="input-group">
                <input type="number" id="min-input" placeholder="Min Price" inputmode="decimal">
                <input type="number" id="max-input" placeholder="Max Price" inputmode="decimal">
            </div>
            
            <button id="set-btn" onclick="setRange()">ACTIVATE ALARM</button>
            
            <div style="margin-top: 20px; color: #f6465d; cursor: pointer; text-decoration: underline;" onclick="clearRange()">
                Clear / Reset
            </div>
        </div>
    </div>

    <!-- Start Overlay -->
    <div id="start-overlay" onclick="initApp()">
        <div id="start-text">TAP TO START</div>
    </div>

    <!-- Kill Switch -->
    <button id="stop-btn" onclick="killAlarm()">STOP</button>

    <script>
        // --- CONFIG ---
        let audioCtx;
        let socket;
        let wakeLock = null;
        
        // --- STATE ---
        let currentPrice = 0;
        let referencePrice = 0; 
        
        // RANGE STATE
        let rangeMin = null;
        let rangeMax = null;

        let isRinging = false;
        let displayMode = 'USD'; // 'USD' or 'SATS'
        let lastRenderTime = 0; 
        
        // Audio
        let oscMain, oscLFO;

        // DOM Elements
        const priceEl = document.getElementById('price-display');
        const statusEl = document.getElementById('status');
        const panelEl = document.getElementById('settings-panel');
        
        // Input Elements
        const minInput = document.getElementById('min-input');
        const maxInput = document.getElementById('max-input');
        const rangeBar = document.getElementById('range-status-bar');
        const rangeText = document.getElementById('active-range-text');

        const startOverlay = document.getElementById('start-overlay');
        const stopBtn = document.getElementById('stop-btn');

        // --- 1. INITIALIZATION ---
        async function initApp() {
            // Audio Context
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            // Wake Lock
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    statusEl.innerText = "SCREEN LOCK ACTIVE";
                }
            } catch (err) { statusEl.innerText = "MONITORING ACTIVE"; }

            startOverlay.style.display = 'none';
            await fetchReferencePrice();
            connectBinance();
            setInterval(fetchReferencePrice, 60000);
        }

        // --- 2. DATA HANDLING ---
        function connectBinance() {
            socket = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');
            
            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                currentPrice = parseFloat(data.p);
                
                const now = Date.now();
                if (now - lastRenderTime > 100) {
                    renderDisplay();
                    lastRenderTime = now;
                }
                
                checkAlerts();
            };

            socket.onerror = () => { statusEl.innerText = "DISCONNECTED - REFRESH"; }
        }

        async function fetchReferencePrice() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=31');
                const data = await res.json();
                referencePrice = parseFloat(data[0][4]); 
            } catch (e) { console.error("Could not fetch history"); }
        }

        // --- 3. RENDERING ---
        function toggleMode() {
            displayMode = displayMode === 'USD' ? 'SATS' : 'USD';
            renderDisplay(); 
        }

        function renderDisplay() {
            if (currentPrice === 0) return;

            let displayValue = "";
            if (displayMode === 'USD') {
                displayValue = Math.floor(currentPrice).toLocaleString();
            } else {
                const sats = Math.floor(100000000 / currentPrice);
                displayValue = sats.toString(); 
            }
            priceEl.innerText = displayValue;

            if (referencePrice > 0) {
                priceEl.className = currentPrice > referencePrice ? 'green' : 'red';
            }
        }

        // --- 4. ALARM LOGIC ---
        function checkAlerts() {
            if (isRinging) return;
            
            if (rangeMin !== null && rangeMax !== null) {
                // Trigger if price leaves the box
                if (currentPrice < rangeMin || currentPrice > rangeMax) {
                    triggerAlarm();
                }
            }
        }

        function triggerAlarm() {
            isRinging = true;
            document.body.classList.add('alarm-active');
            stopBtn.style.display = 'block'; 
            
            // Ensure settings are closed if they happen to be open
            panelEl.style.display = 'none'; 

            if (!audioCtx) return;

            oscMain = audioCtx.createOscillator();
            oscLFO = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const lfoGain = audioCtx.createGain();

            oscMain.type = 'sawtooth';
            oscMain.frequency.value = 800;
            oscLFO.type = 'square';
            oscLFO.frequency.value = 5;
            lfoGain.gain.value = 300;

            oscLFO.connect(lfoGain);
            lfoGain.connect(oscMain.frequency);
            oscMain.connect(gain);
            gain.connect(audioCtx.destination);
            
            oscMain.start();
            oscLFO.start();
        }

        function killAlarm() {
            if(oscMain) oscMain.stop();
            if(oscLFO) oscLFO.stop();
            isRinging = false;
            document.body.classList.remove('alarm-active');
            stopBtn.style.display = 'none';
            
            clearRange(); // Reset logic
            alert("Alarm Stopped. Range cleared.");
        }

        // --- 5. UI UTILS ---
        function openSettings() {
            panelEl.style.display = 'flex';
            // Auto-populate with current price suggestion if empty
            if(minInput.value === '') minInput.value = Math.floor(currentPrice * 0.99);
            if(maxInput.value === '') maxInput.value = Math.floor(currentPrice * 1.01);
        }

        function closeSettings() {
            panelEl.style.display = 'none';
        }

        function setRange() {
            const min = parseFloat(minInput.value);
            const max = parseFloat(maxInput.value);

            if (!min || !max) {
                alert("Please enter both Min and Max values.");
                return;
            }
            if (min >= max) {
                alert("Min must be lower than Max.");
                return;
            }

            rangeMin = min;
            rangeMax = max;

            // Update Status Bar
            rangeText.innerText = `${min.toLocaleString()} - ${max.toLocaleString()}`;
            rangeBar.style.display = 'block';
            
            closeSettings();
        }

        function clearRange() {
            rangeMin = null;
            rangeMax = null;
            rangeBar.style.display = 'none';
            minInput.value = '';
            maxInput.value = '';
            closeSettings();
        }
    </script>
</body>
</html>
