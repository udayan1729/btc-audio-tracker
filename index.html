<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BTC Range Alarm</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- THE MASSIVE NUMBER --- */
        #price-display {
            font-size: 22vw; 
            font-weight: 800;
            font-variant-numeric: tabular-nums; 
            letter-spacing: -2px;
            z-index: 10;
            transition: color 0.3s;
            cursor: pointer;
            user-select: none;
            text-align: center;
            width: 100%;
            line-height: 1;
        }

        .green { color: #0ecb81; }
        .red { color: #f6465d; }

        /* --- SETTINGS BUTTON --- */
        #settings-toggle {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: #222;
            color: #888;
            border: 1px solid #444;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
            user-select: none;
        }

        /* --- SETTINGS PANEL --- */
        #settings-panel {
            display: none;
            position: absolute;
            bottom: 100px;
            right: 30px;
            width: 280px;
            background: #111;
            border: 1px solid #333;
            padding: 15px;
            border-radius: 12px;
            z-index: 30;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .input-group { display: flex; gap: 5px; margin-bottom: 15px; }
        
        input {
            width: 50%; /* Split width for Min/Max */
            padding: 15px;
            background: #000;
            border: 1px solid #333;
            color: white;
            border-radius: 4px;
            font-size: 16px;
            outline: none;
            text-align: center;
        }

        #set-btn {
            background: #F7931A;
            border: none;
            color: white;
            padding: 0 20px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            padding: 15px;
        }

        #current-range-display {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #222;
            text-align: center;
            color: #0ecb81;
            font-size: 14px;
            display: none; /* Hidden by default */
        }

        .range-values {
            font-size: 18px;
            font-weight: bold;
            color: white;
            margin-top: 5px;
        }

        /* --- OVERLAYS --- */
        #start-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            flex-direction: column;
        }
        #start-text {
            color: #0ecb81;
            border: 2px solid #0ecb81;
            padding: 20px 40px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            animation: pulse 2s infinite;
            cursor: pointer;
        }

        @keyframes pulse { 0% {opacity: 0.5;} 50% {opacity: 1;} 100% {opacity: 0.5;} }

        /* Alarm States */
        @keyframes strobe {
            0% { background-color: #ff0000; }
            50% { background-color: #000000; }
            100% { background-color: #ff0000; }
        }

        .alarm-active { animation: strobe 0.2s infinite; }

        #stop-btn {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(255, 0, 0, 0.3);
            z-index: 100;
            border: none;
            color: white;
            font-size: 15vw;
            font-weight: 900;
            text-shadow: 2px 2px 10px #000;
            cursor: pointer;
        }

        #status {
            position: absolute;
            top: 20px;
            font-size: 12px;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 1px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="status">Wait...</div>

    <!-- The Big Number (Clickable) -->
    <div id="price-display" onclick="toggleMode()">---</div>

    <!-- Corner Button -->
    <div id="settings-toggle" onclick="toggleSettings()">SET</div>

    <!-- Settings Menu -->
    <div id="settings-panel">
        <div style="font-size: 12px; color: #888; margin-bottom: 10px; text-align:center;">
            ALARM IF OUTSIDE RANGE:
        </div>
        
        <div class="input-group">
            <input type="number" id="min-input" placeholder="Min (Low)">
            <input type="number" id="max-input" placeholder="Max (High)">
        </div>
        
        <button id="set-btn" onclick="setRange()">ACTIVATE RANGE</button>

        <div id="current-range-display">
            MONITORING ACTIVE
            <div class="range-values" id="range-text"></div>
            <div style="color: #666; font-size: 10px; margin-top:5px; cursor:pointer;" onclick="clearRange()">(Click to Clear)</div>
        </div>
    </div>

    <!-- Start Overlay -->
    <div id="start-overlay" onclick="initApp()">
        <div id="start-text">TAP TO START</div>
    </div>

    <!-- Kill Switch -->
    <button id="stop-btn" onclick="killAlarm()">STOP</button>

    <script>
        // --- CONFIG ---
        let audioCtx;
        let socket;
        let wakeLock = null;
        
        // --- STATE ---
        let currentPrice = 0;
        let referencePrice = 0; // Price 30 mins ago
        
        // RANGE STATE
        let rangeMin = null;
        let rangeMax = null;

        let isRinging = false;
        let displayMode = 'USD'; // 'USD' or 'SATS'
        let lastRenderTime = 0; // For throttling
        
        // Audio
        let oscMain, oscLFO;

        // DOM Elements
        const priceEl = document.getElementById('price-display');
        const statusEl = document.getElementById('status');
        const panelEl = document.getElementById('settings-panel');
        
        // Input Elements
        const minInput = document.getElementById('min-input');
        const maxInput = document.getElementById('max-input');
        const rangeDisplay = document.getElementById('current-range-display');
        const rangeText = document.getElementById('range-text');

        const startOverlay = document.getElementById('start-overlay');
        const stopBtn = document.getElementById('stop-btn');

        // --- 1. INITIALIZATION ---
        async function initApp() {
            // Audio Context
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            // Wake Lock
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    statusEl.innerText = "SCREEN LOCK ACTIVE";
                }
            } catch (err) { statusEl.innerText = "MONITORING ACTIVE"; }

            // UI Cleanup
            startOverlay.style.display = 'none';
            
            // Get initial history
            await fetchReferencePrice();
            
            // Start WebSocket
            connectBinance();

            // Update Reference price every 60 seconds
            setInterval(fetchReferencePrice, 60000);
        }

        // --- 2. DATA HANDLING ---
        function connectBinance() {
            socket = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');
            
            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                currentPrice = parseFloat(data.p);
                
                // Throttle rendering (max 10fps)
                const now = Date.now();
                if (now - lastRenderTime > 100) {
                    renderDisplay();
                    lastRenderTime = now;
                }
                
                checkAlerts();
            };

            socket.onerror = () => { statusEl.innerText = "DISCONNECTED - REFRESH"; }
        }

        async function fetchReferencePrice() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=31');
                const data = await res.json();
                referencePrice = parseFloat(data[0][4]); 
            } catch (e) {
                console.error("Could not fetch history");
            }
        }

        // --- 3. RENDERING ---
        function toggleMode() {
            displayMode = displayMode === 'USD' ? 'SATS' : 'USD';
            renderDisplay(); 
        }

        function renderDisplay() {
            if (currentPrice === 0) return;

            let displayValue = "";
            
            if (displayMode === 'USD') {
                displayValue = Math.floor(currentPrice).toLocaleString();
            } else {
                const sats = Math.floor(100000000 / currentPrice);
                displayValue = sats.toString(); 
            }
            
            priceEl.innerText = displayValue;

            if (referencePrice > 0) {
                if (currentPrice > referencePrice) {
                    priceEl.className = 'green';
                } else {
                    priceEl.className = 'red';
                }
            }
        }

        // --- 4. ALARM LOGIC (MODIFIED) ---
        function checkAlerts() {
            if (isRinging) return;
            
            // Only check if range is set
            if (rangeMin !== null && rangeMax !== null) {
                
                // TRIGGER if price is NOT between the interval
                if (currentPrice < rangeMin || currentPrice > rangeMax) {
                    triggerAlarm();
                }
            }
        }

        function triggerAlarm() {
            isRinging = true;
            document.body.classList.add('alarm-active');
            stopBtn.style.display = 'block'; 
            panelEl.style.display = 'none'; 

            if (!audioCtx) return;

            oscMain = audioCtx.createOscillator();
            oscLFO = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const lfoGain = audioCtx.createGain();

            oscMain.type = 'sawtooth';
            oscMain.frequency.value = 800;
            oscLFO.type = 'square';
            oscLFO.frequency.value = 5;
            lfoGain.gain.value = 300;

            oscLFO.connect(lfoGain);
            lfoGain.connect(oscMain.frequency);
            oscMain.connect(gain);
            gain.connect(audioCtx.destination);
            
            oscMain.start();
            oscLFO.start();
        }

        function killAlarm() {
            if(oscMain) oscMain.stop();
            if(oscLFO) oscLFO.stop();
            isRinging = false;
            document.body.classList.remove('alarm-active');
            stopBtn.style.display = 'none';
            
            // Automatically clear the range so it doesn't trigger immediately again
            clearRange();
            alert("Alarm Stopped. Range cleared.");
        }

        // --- 5. UI UTILS ---
        function toggleSettings() {
            if (panelEl.style.display === 'block') {
                panelEl.style.display = 'none';
            } else {
                panelEl.style.display = 'block';
                // Try to pre-fill active range or current price logic could go here
                if(rangeMin === null) {
                    minInput.value = Math.floor(currentPrice * 0.99); // Suggest 1% lower
                    maxInput.value = Math.floor(currentPrice * 1.01); // Suggest 1% higher
                }
            }
        }

        function setRange() {
            const min = parseFloat(minInput.value);
            const max = parseFloat(maxInput.value);

            if (!min || !max) {
                alert("Please enter both Min and Max values.");
                return;
            }

            if (min >= max) {
                alert("Min must be lower than Max.");
                return;
            }

            // Set State
            rangeMin = min;
            rangeMax = max;

            // Update UI
            rangeText.innerText = `${min.toLocaleString()} - ${max.toLocaleString()}`;
            rangeDisplay.style.display = 'block';
            
            // Hide Input fields visually or just leave them? Let's leave them but update status.
        }

        function clearRange() {
            rangeMin = null;
            rangeMax = null;
            rangeDisplay.style.display = 'none';
            minInput.value = '';
            maxInput.value = '';
        }
    </script>
</body>
</html>
