<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BTC Big Alarm</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* No scrolling */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- THE MASSIVE NUMBER --- */
        #price-display {
            font-size: 24vw; /* Huge relative to screen width */
            font-weight: 800;
            font-variant-numeric: tabular-nums; /* Prevents jittering */
            letter-spacing: -2px;
            z-index: 1;
            transition: color 0.2s;
        }

        .green { color: #0ecb81; }
        .red { color: #f6465d; }

        /* --- SETTINGS BUTTON (Corner) --- */
        #settings-toggle {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: #333;
            color: white;
            border: 1px solid #555;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* --- SETTINGS PANEL (Hidden by default) --- */
        #settings-panel {
            display: none; /* Hidden */
            position: absolute;
            bottom: 100px;
            right: 30px;
            width: 280px;
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 15px;
            border-radius: 12px;
            z-index: 20;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .input-group { display: flex; gap: 5px; margin-bottom: 15px; }
        
        input {
            width: 100%;
            padding: 10px;
            background: #000;
            border: 1px solid #333;
            color: white;
            border-radius: 4px;
            font-size: 16px;
        }

        #add-btn {
            background: #F7931A;
            border: none;
            color: white;
            padding: 0 15px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }

        ul { list-style: none; padding: 0; margin: 0; max-height: 150px; overflow-y: auto; }
        
        li {
            display: flex; 
            justify-content: space-between; 
            padding: 8px 0; 
            border-bottom: 1px solid #333;
            font-size: 14px;
        }

        /* --- START OVERLAY (First Load) --- */
        #start-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            backdrop-filter: blur(5px);
            flex-direction: column;
        }
        #start-text {
            font-size: 1.5rem;
            color: #0ecb81;
            border: 2px solid #0ecb81;
            padding: 20px;
            border-radius: 10px;
            font-weight: bold;
        }

        /* --- ALARM TRIGGERED STATES --- */
        @keyframes strobe {
            0% { background-color: #ff0000; }
            50% { background-color: #000000; }
            100% { background-color: #ff0000; }
        }

        .alarm-active {
            animation: strobe 0.2s infinite;
        }

        /* Giant Stop Button */
        #stop-btn {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(255, 0, 0, 0.5); /* Transparent red */
            z-index: 100;
            border: none;
            color: white;
            font-size: 3rem;
            font-weight: 900;
            cursor: pointer;
            text-shadow: 2px 2px 0 #000;
        }

        #status {
            position: absolute;
            top: 20px;
            font-size: 12px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

    </style>
</head>
<body>

    <!-- Top Status Indicator -->
    <div id="status">Wait...</div>

    <!-- Main Huge Price -->
    <div id="price-display">---</div>

    <!-- Corner Button -->
    <div id="settings-toggle" onclick="toggleSettings()">SET</div>

    <!-- Hidden Settings Menu -->
    <div id="settings-panel">
        <div style="font-size: 12px; color: #888; margin-bottom: 5px;">ALERT IF PRICE BELOW:</div>
        <div class="input-group">
            <input type="number" id="target-input" placeholder="e.g. 64000">
            <button id="add-btn" onclick="addAlert()">+</button>
        </div>
        <ul id="alert-list"></ul>
    </div>

    <!-- Initial "Tap to Start" Overlay -->
    <div id="start-overlay" onclick="initApp()">
        <div id="start-text">TAP TO START</div>
    </div>

    <!-- Emergency Stop Button (Hidden) -->
    <button id="stop-btn" onclick="killAlarm()">STOP ALARM</button>

    <script>
        // --- CONFIG ---
        let audioCtx;
        let socket;
        let wakeLock = null;
        
        // --- STATE ---
        let currentPrice = 0;
        let lastPrice = 0;
        let alerts = [];
        let isRinging = false;
        
        // Audio Nodes
        let oscMain, oscLFO;

        // --- DOM ---
        const priceEl = document.getElementById('price-display');
        const statusEl = document.getElementById('status');
        const panelEl = document.getElementById('settings-panel');
        const listEl = document.getElementById('alert-list');
        const inputEl = document.getElementById('target-input');
        const startOverlay = document.getElementById('start-overlay');
        const stopBtn = document.getElementById('stop-btn');

        // --- 1. INITIALIZATION ---
        async function initApp() {
            // Audio Context
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            // Wake Lock
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    statusEl.innerText = "SCREEN LOCKED ON";
                }
            } catch (err) { statusEl.innerText = "ACTIVE"; }

            // UI Cleanup
            startOverlay.style.display = 'none';
            connectBinance();
        }

        // --- 2. DATA ---
        function connectBinance() {
            socket = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');
            
            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                currentPrice = parseFloat(data.p);
                
                // Update UI (No decimals for bigger size)
                priceEl.innerText = Math.floor(currentPrice);
                
                if (lastPrice > 0) {
                    priceEl.className = currentPrice > lastPrice ? 'green' : 'red';
                }

                checkAlerts();
                lastPrice = currentPrice;
            };

            socket.onerror = () => { statusEl.innerText = "DISCONNECTED"; }
        }

        // --- 3. ALARM LOGIC ---
        function checkAlerts() {
            if (isRinging) return;

            // Trigger if ANY alert is higher than current price
            const triggered = alerts.some(target => currentPrice < target);

            if (triggered) {
                triggerAlarm();
            }
        }

        function triggerAlarm() {
            isRinging = true;
            document.body.classList.add('alarm-active');
            stopBtn.style.display = 'block'; // Show massive button
            panelEl.style.display = 'none'; // Hide settings

            if (!audioCtx) return;

            // Create Siren Sound
            oscMain = audioCtx.createOscillator();
            oscLFO = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const lfoGain = audioCtx.createGain();

            oscMain.type = 'sawtooth'; // Harsh
            oscMain.frequency.value = 800;

            oscLFO.type = 'square';
            oscLFO.frequency.value = 5; // 5 pulses per second

            lfoGain.gain.value = 300; // Pitch variance

            oscLFO.connect(lfoGain);
            lfoGain.connect(oscMain.frequency);
            
            oscMain.connect(gain);
            gain.connect(audioCtx.destination);
            
            oscMain.start();
            oscLFO.start();
        }

        function killAlarm() {
            // Stop Audio
            if(oscMain) oscMain.stop();
            if(oscLFO) oscLFO.stop();
            isRinging = false;

            // Reset UI
            document.body.classList.remove('alarm-active');
            stopBtn.style.display = 'none';

            // Remove triggered alerts so it doesn't loop
            alerts = alerts.filter(target => currentPrice >= target);
            renderList();
        }

        // --- 4. UI HELPERS ---
        function toggleSettings() {
            if (panelEl.style.display === 'block') {
                panelEl.style.display = 'none';
            } else {
                panelEl.style.display = 'block';
                inputEl.focus();
            }
        }

        function addAlert() {
            const val = parseFloat(inputEl.value);
            if (!val) return;
            
            if (val > currentPrice) {
                alert("Target must be LOWER than current price.");
                return;
            }

            alerts.push(val);
            alerts.sort((a,b) => b-a);
            renderList();
            inputEl.value = '';
        }

        function removeAlert(val) {
            alerts = alerts.filter(a => a !== val);
            renderList();
        }

        function renderList() {
            listEl.innerHTML = '';
            alerts.forEach(val => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span>< ${val}</span>
                    <span onclick="removeAlert(${val})" style="color:red;cursor:pointer;">X</span>
                `;
                listEl.appendChild(li);
            });
        }

    </script>
</body>
</html>
